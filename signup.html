<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — TaskFlow</title>
  <meta name="description" content="Create your free TaskFlow account and start organizing your tasks today.">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 70% 60% at 70% 20%, rgba(139,92,246,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(99,102,241,0.12) 0%, transparent 60%),
        var(--bg);
    }

    .auth-card {
      width: 100%; max-width: 440px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
      animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .auth-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;
    }
    .auth-logo .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      box-shadow: 0 4px 16px var(--primary-glow);
    }
    .auth-logo .logo-text {
      font-size: 1.15rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .plan-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 99px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem; font-weight: 600; color: var(--accent-2);
      margin-bottom: 1.25rem;
    }

    .auth-heading    { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .auth-subheading { font-size: 0.85rem; color: var(--text-3); margin-bottom: 1.5rem; }

    .input-wrapper { position: relative; }
    .input-wrapper .input { padding-right: 2.5rem; }
    .eye-toggle {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 1rem; transition: var(--transition);
    }
    .eye-toggle:hover { color: var(--text); }

    /* Password strength */
    .strength-bar {
      display: flex; gap: 3px; margin-top: 0.5rem;
    }
    .strength-seg {
      height: 4px; flex: 1; border-radius: 99px;
      background: var(--surface-2);
      transition: background 0.3s ease;
    }
    .strength-label {
      font-size: 0.72rem; margin-top: 0.3rem;
      font-weight: 600;
    }

    /* Inline validation */
    .field-error {
      font-size: 0.75rem; color: var(--danger);
      margin-top: 0.3rem; display: none;
    }
    .field-error.show { display: block; animation: fadeInUp 0.2s ease; }

    .auth-submit { width: 100%; margin-top: 0.5rem; }

    .auth-terms {
      font-size: 0.75rem; color: var(--text-3);
      text-align: center; margin-top: 0.75rem; line-height: 1.5;
    }
    .auth-terms a { color: var(--primary); }

    .auth-divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.25rem 0; font-size: 0.75rem; color: var(--text-3);
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .auth-footer { text-align: center; font-size: 0.83rem; color: var(--text-3); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .auth-footer a:hover { color: var(--accent-2); }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <div id="plan-badge" class="plan-badge hidden">🎯 <span id="plan-name"></span> Plan Selected</div>

    <h1 class="auth-heading">Create your account</h1>
    <p class="auth-subheading">Free forever. No credit card required.</p>

    <form id="signup-form" autocomplete="off" novalidate>
      <div class="form-field">
        <label class="form-label" for="fullname">Full Name</label>
        <input id="fullname" type="text" placeholder="Alex Johnson" class="input" autocomplete="name">
        <div class="field-error" id="err-name">Name is required.</div>
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" class="input" autocomplete="email">
        <div class="field-error" id="err-email">Please enter a valid email.</div>
      </div>

      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input id="password" type="password" placeholder="At least 6 characters" class="input" autocomplete="new-password">
          <button type="button" class="eye-toggle" id="eye-toggle">👁</button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <div class="strength-label" id="strength-label" style="color:var(--text-3)"></div>
        <div class="field-error" id="err-pw">Password must be at least 6 characters.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg auth-submit" id="signup-btn">🚀 Create Account</button>
    </form>

    <p class="auth-terms">
      By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Already have an account? <a href="signin.html">Sign in</a>
    </div>
  </div>

<script>
  /* Plan badge from URL */
  const plan = new URLSearchParams(window.location.search).get('plan');
  if (plan) {
    document.getElementById('plan-badge').classList.remove('hidden');
    document.getElementById('plan-name').textContent = plan;
  }

  /* Eye toggle */
  document.getElementById('eye-toggle').addEventListener('click', function() {
    const pw = document.getElementById('password');
    if (pw.type === 'password') { pw.type = 'text'; this.textContent = '🙈'; }
    else { pw.type = 'password'; this.textContent = '👁'; }
  });

  /* Password strength */
  const colors = { 0:'transparent', 1:'#ef4444', 2:'#f59e0b', 3:'#6366f1', 4:'#10b981' };
  const labels = { 0:'', 1:'Weak', 2:'Fair', 3:'Good', 4:'Strong' };

  document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById('seg' + i);
      seg.style.background = i <= score ? colors[score] : 'var(--surface-2)';
    }
    const lbl = document.getElementById('strength-label');
    lbl.textContent = labels[score];
    lbl.style.color = colors[score];
  });

  /* Form submit */
  document.getElementById('signup-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name  = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    const btn   = document.getElementById('signup-btn');
    let valid   = true;

    const setErr = (id, show) => {
      document.getElementById(id).classList.toggle('show', show);
      if (show) valid = false;
    };

    setErr('err-name',  !name);
    setErr('err-email', !email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
    setErr('err-pw',    pw.length < 6);

    if (!valid) return;

    btn.textContent = 'Creating account…';
    btn.disabled    = true;

    setTimeout(() => {
      localStorage.setItem('user', JSON.stringify({ name, email, password: pw }));
      btn.textContent = '✓ Account Created!';
      setTimeout(() => window.location.href = 'signin.html', 800);
    }, 700);
  });
</script>
</body>
</html>
